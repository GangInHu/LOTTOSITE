{% extends 'lotto/base.html' %}
{% block title %}로그인 - Lucky 645{% endblock %}
{% block content %}
<div style="max-width:400px;margin:0 auto">
<div class="card">
  <h2>🔐 로그인</h2>
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div class="form-group">
      <label>{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<p style="color:var(--danger);font-size:.83rem">{{ field.errors.0 }}</p>{% endif %}
    </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem">로그인</button>
  </form>
  <p style="margin-top:1rem;text-align:center;color:var(--muted)">계정이 없으신가요? <a href="/register/">회원가입</a></p>
</div>
</div>
{% endblock %}
